# 地域おこし経費管理アプリ 設定ファイル
# ここを編集して自治体のフォーマットに合わせてください

# 自治体設定
municipality: "根室市"
nendo_start_month: 4  # 年度開始月（通常は4月）

# 出納簿の列位置（1始まり）
# 自治体によって異なる場合はここを変更してください
denpyo_columns:
  no: 1           # A列: No（通し番号）
  reiwa: 2        # B列: 「令和」テキスト
  year: 3         # C列: 令和年（数字）
  month: 5        # E列: 月（数字）
  day: 7          # G列: 日（数字）
  source: 9       # I列: 記入者区分（AI / 手動）
  kamoku: 10      # J列: 勘定科目
  memo: 11        # K列: 摘要（merged K-O）
  vendor: 16      # P列: 取引先
  income: 17      # Q列: 収入
  expense: 18     # R列: 支出
  balance: 19     # S列: 残高（数式）
  tsuki_kubun: 20 # T列: 月区分（YYYY-MM）
  note: 21        # U列: 備考

# 出納簿のデータ開始行（ヘッダー行を除いた最初のデータ行）
denpyo_data_start_row: 4

# 勘定科目マッピング
# 左: 一般名称 → 右: この自治体での科目名
kamoku_map:
  旅費交通費: 普通旅費
  通信費: 通信費
  消耗品費: 消耗品
  外注費: 外注費
  印刷製本費: 印刷製本費
  諸会費: 通信費
  研修費: 研修費
  広告宣伝費: 広告宣伝費
  リース料: 消耗品
  新聞図書費: 消耗品
